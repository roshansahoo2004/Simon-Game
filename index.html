<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="simonGame.css">
</head>
<body>
    <h1>Simon Game</h1>
    <div>
        <h2>Press any key to start the game</h2>
    </div>
    <div class="btn-container">
        <div class="line-one">
            <!-- button type karne div clickable ban jayegi aur hum ismai event add kar sakenge -->
            <div class="btn red" type="button" id="red"></div> 
            <div class="btn yellow" type="button" id="yellow"></div>
        </div>
        <div class="line-two">
            <div class="btn green" type="button" id="green"></div>
            <div class="btn purple" type="button" id="purple"></div>
        </div>
    </div>
    <script src="simonGame.js"></script>
</body>
</html>
